# bookscan configuration — paths, languages, thresholds, model choices.
# Every stage and tool reads settings from here (never hard-code paths).

# --- Tesseract (Stage 05 backbone + Gate 1 harness) ---
tesseract:
  # Windows default install path. Override if installed elsewhere.
  binary: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"
  # Directory holding *.traineddata (tessdata_best for eng/bul/ita/deu).
  # Relative paths resolve against the repo root; this dir is gitignored
  # (see models/ in .gitignore). Rebuild it with:
  #   python -m tools.setup_tessdata
  # (downloads the 4 traineddata AND copies Tesseract's configs/ — the latter
  # is required or --tessdata-dir silently drops TSV output.)
  tessdata_dir: "models/tessdata_best"
  oem: 1        # LSTM only
  psm: 3        # fully automatic page segmentation, no OSD

# --- Languages (OCR priority order) ---
# Tesseract lang codes; the 3-letter code is what -l expects.
languages:
  default: eng
  supported:
    - code: eng      # English
    - code: bul      # Bulgarian (Cyrillic)
    - code: ita      # Italian
    - code: deu      # German

# --- Adaptive confidence / uncertainty (Stage 06) ---
# NOTE: thresholds are adaptive PER DOCUMENT, never a single global cutoff.
# These are the knobs the adaptive logic tunes around, not fixed gates.
#
# The rule (Stage 06):
#   threshold = clip( percentile(word_confs, flag_rate*100), conf_floor, conf_ceiling )
#   a word is "uncertain" iff conf < threshold  (or a second engine disagrees).
# flag_rate is a TARGET that BENDS with the document: in a clean doc the ceiling
# bites (flag fewer than flag_rate — only the genuine low-conf tail); in a garbage
# doc the floor bites (flag MORE than flag_rate). The operating point moves with
# the confidence distribution between the two rails, so it is adaptive, not a
# single hard cutoff. Stage 06 records the raw + clamped threshold in meta.json.
uncertainty:
  # Default fraction of words to flag when using per-document adaptive threshold.
  flag_rate: 0.10
  # Sanity rails on the adaptive threshold (Tesseract conf scale 0-100). Anchored
  # to real testset per-word conf histograms (bg_01: p10=92, p50=96, genuine bad
  # tail <65; en_coins_01: p10=82, p50=96, tail <65). The clean bulk sits >=82, so
  # conf_ceiling=75 lands between bulk and tail: a clean doc flags only its real
  # low-conf tail (bg ~3%, en ~7%), never good words. conf_floor=45 is the minimum
  # threshold for a garbage doc (untested by the current all-clean testset, so a
  # theoretical rail for now). Tune these when a genuinely-garbled page lands.
  conf_floor: 45.0
  conf_ceiling: 75.0
  # Cross-engine disagreement is an independent trigger for "uncertain". Stage 05's
  # EasyOCR second opinion sets Word.engine_disagree (dictionary-gated — see
  # engines.easyocr.lexicon); Stage 06 ORs it into `uncertain`. Inert on a page
  # only when Stage 05 ran no second opinion (lang not enabled or lexicon absent).
  disagreement_is_trigger: true
  # Selectable output mode: flag | best_guess | patch
  default_mode: flag

# --- Second-opinion engines (never the sole text/confidence source) ---
engines:
  easyocr:
    enabled_for: [bul]   # Cyrillic second opinion (production scope, per CLAUDE.md)
    langs: [bg, en]      # EasyOCR reader languages (bg = Bulgarian Cyrillic)
    gpu: true
    # EasyOCR only flags a Tesseract word (Word.engine_disagree) when its OWN
    # line-region confidence clears this floor — keeps EasyOCR's junk reads from
    # nominating alternatives. Tuned on the spike: kills 0.09 'L=' noise, keeps
    # 0.34+ real-content lines.
    min_region_conf: 0.30
    # Per-language lexicon paths (relative to repo root), keyed by Tesseract lang
    # code. THE DICTIONARY GATE that makes the disagreement trigger usable: flag
    # a Tesseract word only when it is a NON-word AND EasyOCR nominated a VALID
    # dictionary word in its place (see RESULTS.md 2026-07-18 — the raw diff was
    # ~0 precision on Cyrillic; EasyOCR is the noisier reader there). A path that
    # does not exist -> the trigger is INERT and EasyOCR is not even loaded.
    #
    # OWNER DEPENDENCY: no lexicon ships in the repo yet, so this seam is
    # currently inert. Supplying one activates BOTH this trigger and the Stage 08
    # de-hyphenation rule (same dependency). Lexicons are gitignored under
    # models/lexicons/ (one word per line, UTF-8).
    lexicon:
      bul: "models/lexicons/bg.txt"
      eng: "models/lexicons/en.txt"
      ita: "models/lexicons/it.txt"
      deu: "models/lexicons/de.txt"

# --- Models (loaded lazily per stage; VRAM released on CLI exit) ---
models:
  layout: doclayout-yolo
  dewarp: uvdoc
  dewarp_partial: doctr++

# --- Stage 03 dewarp ---
dewarp:
  # UVDoc checkpoint (~32 MB), gitignored under models/. Download from
  # github.com/tanguymagne/UVDoc (model/best_model.pkl). Relative paths resolve
  # against the repo root. Missing -> Stage 03 falls back to classical.
  uvdoc_ckpt: "models/uvdoc/best_model.pkl"

# --- Stage 04 layout + reading order ---
layout:
  # DocLayout-YOLO checkpoint (~40 MB), gitignored under models/. Download from
  # HF 'juliozhao/DocLayout-YOLO-DocStructBench'
  # (doclayout_yolo_docstructbench_imgsz1024.pt). Relative paths resolve against
  # the repo root. Missing -> Stage 04 falls back to classical (flagged).
  yolo_ckpt: "models/doclayout_yolo/doclayout_yolo_docstructbench_imgsz1024.pt"

# --- Reconstruction (Stages 07 assemble + 08 render) ---
# Stage 07 copies these into document.json's settings; Stage 08 render honors
# them (editing a setting in document.json + re-rendering just works).
reconstruct:
  fonts:
    # Noto covering Latin + Cyrillic; embed into the PDF.
    - Noto Serif
    - Noto Sans
  strip_running_headers: true   # user toggle
  strip_page_numbers: true      # user toggle
  # PDF backend for Stage 08 (owner decision: headless Chromium via Playwright).
  # Chromium renders the EXACT self-contained page.html render already produces,
  # so the PDF matches the browser preview (one rendering target, not two).
  #   chromium   -> Playwright headless Chromium (default; `playwright install chromium`)
  #   weasyprint -> secondary fallback if importable (its CSS engine may diverge)
  #   auto       -> chromium, then weasyprint, then HTML-only
  #   none       -> HTML-only (skip PDF)
  # Any backend that is chosen but unavailable falls through to the next; render
  # ALWAYS still writes page.html, so the gate is never blocked.
  pdf_backend: chromium

# --- Paths ---
paths:
  jobs: "jobs"
  testset: "testset"
  results: "docs/RESULTS.md"
