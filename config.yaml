# bookscan configuration — paths, languages, thresholds, model choices.
# Every stage and tool reads settings from here (never hard-code paths).

# --- Tesseract (Stage 05 backbone + Gate 1 harness) ---
tesseract:
  # Windows default install path. Override if installed elsewhere.
  binary: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"
  # Directory holding *.traineddata (tessdata_best for eng/bul/ita/deu).
  # Relative paths resolve against the repo root; this dir is gitignored
  # (see models/ in .gitignore). Rebuild it with:
  #   python -m tools.setup_tessdata
  # (downloads the 4 traineddata AND copies Tesseract's configs/ — the latter
  # is required or --tessdata-dir silently drops TSV output.)
  tessdata_dir: "models/tessdata_best"
  oem: 1        # LSTM only
  psm: 3        # fully automatic page segmentation, no OSD

# --- Languages (OCR priority order) ---
# Tesseract lang codes; the 3-letter code is what -l expects.
languages:
  default: eng
  supported:
    - code: eng      # English
    - code: bul      # Bulgarian (Cyrillic)
    - code: ita      # Italian
    - code: deu      # German

# --- Adaptive confidence / uncertainty (Stage 06) ---
# NOTE: thresholds are adaptive PER DOCUMENT, never a single global cutoff.
# These are the knobs the adaptive logic tunes around, not fixed gates.
uncertainty:
  # Default fraction of words to flag when using per-document adaptive threshold.
  flag_rate: 0.10
  # Cross-engine disagreement is an independent trigger for "uncertain".
  disagreement_is_trigger: true
  # Selectable output mode: flag | best_guess | patch
  default_mode: flag

# --- Second-opinion engines (never the sole text/confidence source) ---
engines:
  easyocr:
    enabled_for: [bul]   # Cyrillic second opinion
    langs: [bg, en]

# --- Models (loaded lazily per stage; VRAM released on CLI exit) ---
models:
  layout: doclayout-yolo
  dewarp: uvdoc
  dewarp_partial: doctr++

# --- Stage 03 dewarp ---
dewarp:
  # UVDoc checkpoint (~32 MB), gitignored under models/. Download from
  # github.com/tanguymagne/UVDoc (model/best_model.pkl). Relative paths resolve
  # against the repo root. Missing -> Stage 03 falls back to classical.
  uvdoc_ckpt: "models/uvdoc/best_model.pkl"

# --- Stage 04 layout + reading order ---
layout:
  # DocLayout-YOLO checkpoint (~40 MB), gitignored under models/. Download from
  # HF 'juliozhao/DocLayout-YOLO-DocStructBench'
  # (doclayout_yolo_docstructbench_imgsz1024.pt). Relative paths resolve against
  # the repo root. Missing -> Stage 04 falls back to classical (flagged).
  yolo_ckpt: "models/doclayout_yolo/doclayout_yolo_docstructbench_imgsz1024.pt"

# --- Reconstruction (Stage 07) ---
reconstruct:
  fonts:
    # Noto covering Latin + Cyrillic; embed into the PDF.
    - Noto Serif
    - Noto Sans
  strip_running_headers: true   # user toggle
  strip_page_numbers: true      # user toggle

# --- Paths ---
paths:
  jobs: "jobs"
  testset: "testset"
  results: "docs/RESULTS.md"
